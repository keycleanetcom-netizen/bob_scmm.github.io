<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Strayfe | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white italic">STRAYFE<span class="text-sky-500">.DE</span></h2>
            <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest font-bold">Login Area</p>
        </div>

        <form class="space-y-4" onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="E-Mail" required 
                class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            
            <input type="password" id="loginPass" placeholder="Passwort" required 
                class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            
            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-sky-500/20 active:scale-95">
                ANMELDEN
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-800 pt-6">
            <p class="text-slate-500 text-sm">
                Neu hier? 
                <a href="register.html" class="text-sky-500 font-bold hover:underline ml-1">Account erstellen</a>
            </p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            // Verhindert das Neuladen der Seite
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            // Hier simulieren wir den Login
            if (email && pass) {
                // Weiterleitung zur Hauptseite
                window.location.href = "home.html";
            } else {
                alert("Bitte fülle alle Felder aus.");
            }
        }
    </script>

</body>
</html>
