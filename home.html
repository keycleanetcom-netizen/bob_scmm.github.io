<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strayfe.de | Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .glass-nav { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .gradient-text { 
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
            background: rgba(15, 23, 42, 0.6);
        }

        /* Dropdown & Modal Animationen */
        #profileDropdown, #profileModal { display: none; opacity: 0; }
        #profileDropdown.show { display: block; animation: slideIn 0.2s ease-out forwards; }
        #profileModal.show { display: flex; animation: fadeIn 0.3s ease-out forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(10px); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
