<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Strayfe | Registrierung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white italic">STRAYFE<span class="text-sky-500">.DE</span></h2>
            <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest font-bold">Registrierung</p>
        </div>

        <form class="space-y-4" onsubmit="handleRegister(event)">
            <input type="text" id="regUser" placeholder="Username" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            <input type="email" placeholder="E-Mail Adresse" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            <input type="password" id="pw1" placeholder="Passwort wählen" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            <input type="password" id="pw2" placeholder="Passwort bestätigen" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-white focus:border-sky-500 outline-none transition-all">
            
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-emerald-500/20">JETZT ERSTELLEN</button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-500 text-sm">
                Hast du schon einen Account? 
                <a href="index.html" class="text-sky-500 font-bold hover:underline ml-1">Zum Login</a>
            </p>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            // Verhindert, dass die Seite einfach nur neu lädt
            event.preventDefault();

            const user = document.getElementById('regUser').value;
            const pass1 = document.getElementById('pw1').value;
            const pass2 = document.getElementById('pw2').value;

            // Kurzer Check: Passwörter müssen gleich sein
            if (pass1 !== pass2) {
                alert("Die Passwörter stimmen nicht überein!");
                return;
            }

            // Erfolgsmeldung
            alert("Willkommen bei Strayfe, " + user + "!");

            // WEITERLEITUNG zur Hauptseite
            // Stelle sicher, dass deine Haupt-Datei "home.html" heißt!
            window.location.href = "home.html";
        }
    </script>

</body>
</html>

</body>
